name: OpenWrt x86_64 Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 3'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Restore last built version cache
        id: cache-version
        uses: actions/cache/restore@v4
        with:
          path: last_build_version.txt
          key: last-build-version-
          restore-keys: |
            last-build-version-

      - name: Get latest OpenWrt stable release tag
        id: get_latest_tag
        run: |
          TAG=$(git ls-remote --tags --refs https://github.com/openwrt/openwrt.git | awk -F/ '{print $NF}' | grep -E '^v[0-9]' | grep -v 'rc' | sort -V | tail -n1)
          if [ -z "$TAG" ]; then
            echo "❌ Failed to fetch latest tag. Stop build."
            exit 1
          fi
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          if [ ! -f last_build_version.txt ]; then
            LAST_VER="none"
          else
            LAST_VER=$(cat last_build_version.txt)
          fi
          
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          if [ "$LAST_VER" = "$LATEST_TAG" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Build skipped notice
        if: steps.compare.outputs.should_build == 'false'
        run: echo "🚫 No build performed because there's no new version."

      - name: Free up disk space
        if: steps.compare.outputs.should_build == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Show available disk space
        if: steps.compare.outputs.should_build == 'true'
        run: df -h

      - name: Install dependencies
        if: steps.compare.outputs.should_build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3-pyelftools ccache ash

      - name: Clone OpenWrt source
        if: steps.compare.outputs.should_build == 'true'
        run: |
          TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          echo "Cloning branch/tag: $TAG"
          git clone --depth=1 --branch "$TAG" https://github.com/openwrt/openwrt.git openwrt

      - name: Load custom Feeds (check_feeds.sh)
        if: steps.compare.outputs.should_build == 'true'
        run: |
          bash scripts/check_feeds.sh

      - name: Load External Packages (ext_packages.sh)
        if: steps.compare.outputs.should_build == 'true'
        working-directory: ./openwrt
        run: |
          bash ../scripts/ext_packages.sh

      - name: Apply Custom Configuration (customize.sh & .config)
        if: steps.compare.outputs.should_build == 'true'
        working-directory: ./openwrt
        run: |
          cp ../config/.config .config
          if [ -f ../config/customize.sh ]; then
            bash ../config/customize.sh
          fi

      - name: Make defconfig and download sources
        if: steps.compare.outputs.should_build == 'true'
        working-directory: ./openwrt
        run: |
          make defconfig
          make download -j8

      - name: Build OpenWrt x86_64
        if: steps.compare.outputs.should_build == 'true'
        working-directory: ./openwrt
        run: |
          echo -e "$(nproc) thread compile"
          
          export GITHUB_ACTIONS=false
          
          export CARGO_BUILD_JOBS=2
          
          make -j$(nproc) || make -j1 V=s

      - name: Get build time
        if: steps.compare.outputs.should_build == 'true'
        id: buildtime
        run: echo "time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload firmware
        if: steps.compare.outputs.should_build == 'true'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.IGH_TOKEN }}
          tag: ${{ steps.get_latest_tag.outputs.latest_tag }}
          name: OpenWrt x86_64 ${{ steps.get_latest_tag.outputs.latest_tag }}
          body: |
            🎉 OpenWrt x86_64 ${{ steps.get_latest_tag.outputs.latest_tag }}
            📅 构建时间：${{ steps.buildtime.outputs.time }}
            🔗 上游源码：https://github.com/openwrt/openwrt/tree/${{ steps.get_latest_tag.outputs.latest_tag }}
          artifacts: openwrt/bin/targets/x86/64/*.img.gz
          makeLatest: true
          skipIfReleaseExists: true

      - name: Save latest built version to file
        if: steps.compare.outputs.should_build == 'true'
        run: echo "${{ steps.get_latest_tag.outputs.latest_tag }}" > last_build_version.txt

      - name: Save last built version cache
        if: steps.compare.outputs.should_build == 'true'
        uses: actions/cache/save@v4
        with:
          path: last_build_version.txt
          key: last-build-version-${{ github.run_id }}
